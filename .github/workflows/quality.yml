name: Quality

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: PHP quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, gd
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict --no-check-publish

      - name: Prepare test environment
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Check dependency advisories
        run: composer audit --locked --no-interaction

      - name: Check PHP formatting
        run: vendor/bin/pint --test app/Services/Checkout app/Services/Pricing app/Observers app/Console app/Models/User.php app/Models/Payment.php tests

      - name: Run application tests
        run: php artisan test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build
